<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart YouTube Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 340px;
      padding: 16px;
      background: #fff;
      color: #222;
      font-size: 13px;
    }
    h1 {
      font-size: 15px;
      margin-bottom: 16px;
      color: #444;
    }
    .value-display {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin: 4px 0 2px;
    }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #999;
      margin-bottom: 2px;
    }
    input[type="range"] {
      width: 100%;
      margin: 6px 0;
      accent-color: #065fd4;
    }
    .description {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin: 2px 0 14px;
      min-height: 16px;
    }
    .presets {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .presets button {
      flex: 1;
      padding: 5px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #444;
    }
    .presets button:hover {
      background: #f0f0f0;
    }
    .presets button.active {
      border-color: #065fd4;
      background: #e8f0fe;
      color: #065fd4;
      font-weight: 600;
    }
    .save-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #065fd4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .save-btn:hover { background: #0456c4; }
    .save-btn:active { background: #044ea8; }
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      min-height: 18px;
      color: #0a0;
    }
    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Smart YouTube Feed</h1>

  <div class="value-display" id="thresholdValue">0</div>

  <div class="slider-labels">
    <span>Lenient</span>
    <span>Balanced</span>
    <span>Strict</span>
  </div>
  <input
    type="range"
    id="filterThreshold"
    min="-10"
    max="10"
    value="0"
    step="1"
  />
  <div class="description" id="thresholdDescription">
    Default filtering behavior
  </div>

  <div class="presets">
    <button data-value="-5">Lenient</button>
    <button data-value="0" class="active">Balanced</button>
    <button data-value="5">Strict</button>
    <button data-value="10">Maximum</button>
  </div>

  <button class="save-btn" id="save">Save</button>
  <div class="status" id="status"></div>
  <div class="hint">Changes apply after refreshing YouTube.</div>
  <script src="options.js"></script>
</body>
</html>
